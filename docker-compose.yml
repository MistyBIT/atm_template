services:
  tool-api:
    build: ./service
    restart: unless-stopped
    ports:
      - '${TOOL_API_PUBLISH_PORT:-8091}:8080'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ATM_TOOL_ID: ${ATM_TOOL_ID:-}
      ATM_TOOL_NAME: ${ATM_TOOL_NAME:-}
      PORT: '8080'

  tool-mf:
    build:
      context: ./mf
      args:
        ATM_TEMPLATE_REMOTE_NAME: ${ATM_TEMPLATE_REMOTE_NAME:-remote_template}
    restart: unless-stopped
    depends_on:
      - tool-api
    ports:
      - '${TOOL_MF_PUBLISH_PORT:-8092}:80'
